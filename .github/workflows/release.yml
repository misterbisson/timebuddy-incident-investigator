name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  version:
    # release-please (release-please-config.json / .release-please-manifest.json)
    # maintains a single accumulating "chore(release): X.Y.Z" PR of every
    # unreleased feat/fix/breaking commit since the last tag (including
    # Dependabot's fix(deps)/fix(deps-dev) bumps) — nothing is published here.
    # Merging that PR through the normal required-status-checks path is what
    # actually cuts a release: release-please tags vX.Y.Z on the merge commit,
    # which is what the release job below builds and publishes from. This
    # (rather than a direct push to main) is required because main's branch
    # protection has no bypass for direct pushes.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true

  release:
    # electron-builder is what actually creates the GitHub release + uploads
    # installers, same as before — this only runs once `version` has bumped and
    # tagged a real release, and builds against that tag rather than the commit
    # that triggered the workflow (which is one behind it after the version bump).
    needs: version
    if: needs.version.outputs.published == 'true'
    permissions:
      contents: write

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: v${{ needs.version.outputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # macOS code signing: self-signed cert for now (no notarization until a real
      # Apple Developer ID is set up — see electron/SELF_SIGNED_SETUP.md).
      - name: Import signing certificate
        if: matrix.os == 'macos-latest'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PWD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -P "$MACOS_CERTIFICATE_PWD" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/\"//g')

          # electron-builder/@electron/osx-sign only pick a signing identity via
          # `security find-identity -v` (trusted identities only), and a self-signed
          # cert's root isn't trusted by macOS by default. Trusting it requires
          # `add-trusted-cert`, which needs the `com.apple.trust-settings.admin`
          # authorization right — newer macOS runner images (macos-26-arm64) no
          # longer let CI pre-authorize that right, so the step now fails outright
          # (`NO (-60005)`) instead of the old hang. `codesign` itself doesn't care
          # about trust, only Gatekeeper/verification does, so skip electron-builder's
          # own signing entirely: look the identity up via the untrusted-inclusive
          # `find-identity` (no `-v`) and pass its hash to the build step, which signs
          # manually in `afterSign` (see electron/scripts/afterSign.js).
          IDENTITY_HASH=$(security find-identity "$KEYCHAIN_PATH" | grep -Eo '[0-9A-F]{40}' | head -1)
          if [[ -z "$IDENTITY_HASH" ]]; then
            echo "::error::No signing identity found in imported certificate"
            exit 1
          fi
          echo "CODESIGN_IDENTITY_HASH=$IDENTITY_HASH" >> "$GITHUB_ENV"

          rm certificate.p12

      - name: Build and Publish
        working-directory: electron
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            npm run build-mac -- --publish always
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            npm run build-win -- --publish always
          else
            npm run build-linux -- --publish always
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # electron-builder's own signing is trust-gated (see the "Import signing
          # certificate" step above) and CODESIGN_IDENTITY_HASH already flows in via
          # $GITHUB_ENV from that step, so tell electron-builder not to attempt its
          # own (trust-gated) identity discovery — signing happens manually in
          # afterSign (electron/scripts/afterSign.js) instead.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          # APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID are intentionally
          # unset for now: scripts/afterSign.js no-ops the notarize step without them,
          # so the mac build is signed but not notarized until a real Apple Developer
          # ID is set up.

  build-pr:
    if: github.event_name == 'pull_request'

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (PR test, unsigned)
        working-directory: electron
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            npm run build-mac -- --publish=never
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            npm run build-win -- --publish=never
          else
            npm run build-linux -- --publish=never
          fi
        shell: bash
