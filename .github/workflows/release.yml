name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Manual recovery path: rebuild and (re-)publish the installers for an
  # already-tagged, already-published release whose assets are missing or need
  # replacing — e.g. the 0.2.0–0.4.0 releases that shipped with no installers
  # because electron-builder's default draft publish type was incompatible with
  # release-please's published release (fixed by build.publish.releaseType in
  # electron/package.json). See the `republish` job below.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to (re)build and publish assets for, e.g. v0.4.0'
        required: true
        type: string

jobs:
  version:
    # release-please (release-please-config.json / .release-please-manifest.json)
    # maintains a single accumulating "chore(release): X.Y.Z" PR of every
    # unreleased feat/fix/breaking commit since the last tag (including
    # Dependabot's fix(deps)/fix(deps-dev) bumps) — nothing is published here.
    # Merging that PR through the normal required-status-checks path is what
    # actually cuts a release: release-please tags vX.Y.Z on the merge commit,
    # which is what the release job below builds and publishes from. This
    # (rather than a direct push to main) is required because main's branch
    # protection has no bypass for direct pushes.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release:
    # release-please (above) creates the vX.Y.Z tag AND the GitHub release when
    # the "chore(release)" PR merges; electron-builder here uploads the installers
    # to that existing release. This only runs once `version` has bumped and
    # tagged a real release (release_created == true), and builds against that tag
    # rather than the commit that triggered the workflow (which is one behind it
    # after the version bump).
    #
    # NOTE: the tag and the GitHub release are created together by release-please;
    # do NOT set skip-github-release on the version job — it skips the tag too,
    # leaving release_created empty (so this job never runs) and the merged
    # release PR untagged (which makes every later release-please run abort with
    # "untagged, merged release PRs outstanding").
    needs: version
    if: needs.version.outputs.published == 'true'
    permissions:
      contents: write

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: v${{ needs.version.outputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # macOS code signing: self-signed cert for now (no notarization until a real
      # Apple Developer ID is set up — see electron/SELF_SIGNED_SETUP.md).
      - name: Import signing certificate
        if: matrix.os == 'macos-latest'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PWD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -P "$MACOS_CERTIFICATE_PWD" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/\"//g')

          # electron-builder/@electron/osx-sign only pick a signing identity via
          # `security find-identity -v` (trusted identities only), and a self-signed
          # cert's root isn't trusted by macOS by default. Trusting it requires
          # `add-trusted-cert`, which needs the `com.apple.trust-settings.admin`
          # authorization right — newer macOS runner images (macos-26-arm64) no
          # longer let CI pre-authorize that right, so the step now fails outright
          # (`NO (-60005)`) instead of the old hang. `codesign` itself doesn't care
          # about trust, only Gatekeeper/verification does, so skip electron-builder's
          # own signing entirely: look the identity up via the untrusted-inclusive
          # `find-identity` (no `-v`) and pass its hash to the build step, which signs
          # manually in `afterSign` (see electron/scripts/afterSign.js).
          IDENTITY_HASH=$(security find-identity "$KEYCHAIN_PATH" | grep -Eo '[0-9A-F]{40}' | head -1)
          if [[ -z "$IDENTITY_HASH" ]]; then
            echo "::error::No signing identity found in imported certificate"
            exit 1
          fi
          echo "CODESIGN_IDENTITY_HASH=$IDENTITY_HASH" >> "$GITHUB_ENV"

          rm certificate.p12

      - name: Build and Publish
        working-directory: electron
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            npm run build-mac -- --publish always
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            npm run build-win -- --publish always
          else
            npm run build-linux -- --publish always
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # electron-builder's own signing is trust-gated (see the "Import signing
          # certificate" step above) and CODESIGN_IDENTITY_HASH already flows in via
          # $GITHUB_ENV from that step, so tell electron-builder not to attempt its
          # own (trust-gated) identity discovery — signing happens manually in
          # afterSign (electron/scripts/afterSign.js) instead.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          # APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID are intentionally
          # unset for now: scripts/afterSign.js no-ops the notarize step without them,
          # so the mac build is signed but not notarized until a real Apple Developer
          # ID is set up.

  republish:
    # Manual recovery job (workflow_dispatch, `tag` input). Rebuilds and uploads
    # the installers for an existing, already-published release whose assets are
    # missing. Mirrors the `release` job's signing + build steps, but checks out
    # the requested tag, builds with `--publish never`, and uploads the artifacts
    # with `gh release upload`. It deliberately does NOT use electron-builder's
    # own publisher: for an old release, electron-builder refuses to publish
    # ("existing release published more than 2 hours ago") as a guard against
    # clobbering a shipped release — exactly the case when backfilling. `gh
    # release upload` has no such guard, so it works for any tag (0.2.0–0.4.0)
    # regardless of age or how the release was created.
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Import signing certificate
        if: matrix.os == 'macos-latest'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PWD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -P "$MACOS_CERTIFICATE_PWD" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/\"//g')

          IDENTITY_HASH=$(security find-identity "$KEYCHAIN_PATH" | grep -Eo '[0-9A-F]{40}' | head -1)
          if [[ -z "$IDENTITY_HASH" ]]; then
            echo "::error::No signing identity found in imported certificate"
            exit 1
          fi
          echo "CODESIGN_IDENTITY_HASH=$IDENTITY_HASH" >> "$GITHUB_ENV"

          rm certificate.p12

      - name: Build (no publish)
        working-directory: electron
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            npm run build-mac -- --publish never
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            npm run build-win -- --publish never
          else
            npm run build-linux -- --publish never
          fi
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # Upload the built installers (+ blockmaps + electron-updater metadata) to
      # the existing release via the gh CLI, which — unlike electron-builder's
      # publisher — has no draft/age guard. The three platforms write distinct
      # metadata files (latest.yml / latest-mac.yml / latest-linux.yml), so
      # parallel matrix uploads to the same release don't collide. --clobber makes
      # re-runs idempotent.
      - name: Upload assets to release
        working-directory: electron/dist
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            files=(*.dmg *.dmg.blockmap latest-mac.yml)
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            files=(*.exe *.exe.blockmap latest.yml)
          else
            files=(*.AppImage latest-linux.yml)
          fi
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No build artifacts found to upload for ${{ matrix.os }}"
            exit 1
          fi
          echo "Uploading to ${{ inputs.tag }}: ${files[*]}"
          gh release upload "${{ inputs.tag }}" "${files[@]}" \
            --repo "${{ github.repository }}" --clobber

  build-pr:
    if: github.event_name == 'pull_request'

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (PR test, unsigned)
        working-directory: electron
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            npm run build-mac -- --publish=never
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            npm run build-win -- --publish=never
          else
            npm run build-linux -- --publish=never
          fi
        shell: bash
