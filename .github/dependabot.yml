version: 2

updates:
  # Root workspace (the MCP server engine). "electron" is a separate npm
  # workspace member (see package.json's "workspaces") with its own
  # manifest/lockfile scope, so it gets its own entry below rather than
  # relying on Dependabot's workspace auto-detection.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    # Explicit override, not GitHub's zero-config default: Dependabot's
    # auto-titling is inconsistent across ecosystems/directories in this repo
    # (observed: the /electron entry below produced `build(deps-dev): ...`
    # titles unprompted, but this root entry and the github-actions entry
    # produced plain `bump X from Y to Z` with no prefix at all). Pin the
    # prefix explicitly so every PR title is picked up by release-please's
    # default versioning, which only bumps on fix/feat/breaking commits (no
    # config-driven equivalent of semantic-release's dependencyReleaseRules) —
    # hence "fix" here rather than the more conventional "chore" for deps.
    commit-message:
      prefix: "fix"
      prefix-development: "fix"
      include: "scope"

  - package-ecosystem: npm
    directory: "/electron"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: "fix"
      prefix-development: "fix"
      include: "scope"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "fix"
      include: "scope"
